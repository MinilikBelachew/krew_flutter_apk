workflows:
  ios-workflow:
    name: iOS Build and IPA
    max_build_duration: 60
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: "com.krew.movers"
    scripts:
      - name: Fetch dependencies
        script: |
          flutter pub get

      - name: Run tests
        script: |
          flutter test

      - name: Build Android APK
        script: |
          flutter build apk --debug

      - name: Build iOS for Emulator
        script: |
          flutter build ios --simulator --debug
          # Zip the .app bundle for the online emulator
          cd build/ios/iphonesimulator
          zip -r ../../../Runner.zip Runner.app

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - Runner.zip

    publishing:
      email:
        recipients:
          - bminilik12@gmail.com